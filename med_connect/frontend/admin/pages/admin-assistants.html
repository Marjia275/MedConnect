<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Assistants — MedConnect Admin</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeSidebar()"></div>
  <div class="admin-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="brand">Med<span>Connect</span></div>
        <div class="tag"><i class="fa-solid fa-shield-halved"></i> Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-link" href="admin-dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a class="nav-link" href="admin-users.html"><i class="fa-solid fa-users"></i> All Users</a>
        <a class="nav-link" href="admin-doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctor Approval</a>
        <a class="nav-link active" href="admin-assistants.html"><i class="fa-solid fa-user-nurse"></i> Assistants</a>
        <div class="nav-section-label">Reports</div>
        <a class="nav-link" href="admin-reports.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a class="nav-link" href="admin-appointments.html"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">
          <div class="admin-avatar">🛡️</div>
          <div>
            <div class="admin-name" id="admin-name">Admin</div>
            <div class="admin-role">System Administrator</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar-title">Assistant Management</div>
        <div class="topbar-right">
          <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="fa-solid fa-plus"></i> Create
            Assistant</button>
        </div>
      </div>

      <div class="page-body">
        <div class="card">
          <div class="card-header">
            <h3><i class="fa-solid fa-user-nurse" style="color:var(--teal)"></i> All Assistants</h3>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Linked Doctor</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="asst-tbody">
                  <tr>
                    <td colspan="7" style="text-align:center;padding:32px;color:var(--gray)">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Assistant Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fa-solid fa-user-nurse" style="color:var(--teal)"></i> Create Assistant Account</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input class="input" id="f-fname" placeholder="First name" />
          </div>
          <div class="form-group"><label>Last Name</label><input class="input" id="f-lname" placeholder="Last name" />
          </div>
        </div>
        <div class="form-group"><label>Email</label><input class="input" id="f-email" type="email"
            placeholder="assistant@example.com" /></div>
        <div class="form-group"><label>Phone</label><input class="input" id="f-phone" placeholder="01XXXXXXXXX" /></div>
        <div class="form-group"><label>Password</label><input class="input" id="f-pass" type="password"
            placeholder="Min 6 characters" /></div>
        <div class="form-group">
          <label>Link to Doctor (optional)</label>
          <select class="select" id="f-doctor">
            <option value="">— Not linked —</option>
          </select>
        </div>
        <div id="modal-err" style="color:var(--red-text);font-size:13px;margin-top:8px;display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="create-btn" onclick="createAssistant()"><i class="fa-solid fa-plus"></i>
          Create Account</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
    <script src="../../js/config.js"></script>
  <script src="../js/admin-assistants.js"></script>
  
</body>

</html>
