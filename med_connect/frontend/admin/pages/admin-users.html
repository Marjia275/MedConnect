<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>User Management — MedConnect Admin</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeSidebar()"></div>
  <div class="admin-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="brand">Med<span>Connect</span></div>
        <div class="tag"><i class="fa-solid fa-shield-halved"></i> Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-link" href="admin-dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a class="nav-link active" href="admin-users.html"><i class="fa-solid fa-users"></i> All Users</a>
        <a class="nav-link" href="admin-doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctor Approval</a>
        <a class="nav-link" href="admin-assistants.html"><i class="fa-solid fa-user-nurse"></i> Assistants</a>
        <div class="nav-section-label">Reports</div>
        <a class="nav-link" href="admin-reports.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a class="nav-link" href="admin-appointments.html"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">
          <div class="admin-avatar">🛡️</div>
          <div>
            <div class="admin-name" id="admin-name">Admin</div>
            <div class="admin-role">System Administrator</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar-title">User Management</div>
        <div class="topbar-right"><span class="topbar-time" id="total-count"
            style="background:var(--teal-light);color:var(--teal);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700"></span>
        </div>
      </div>

      <div class="page-body">
        <div class="card">
          <div class="card-header">
            <h3><i class="fa-solid fa-users" style="color:var(--teal)"></i> All Users</h3>
          </div>
          <div class="card-body">
            <div class="filter-bar">
              <div class="search-wrap">
                <i class="fa-solid fa-search"></i>
                <input class="search-input" id="search" placeholder="Search name, email, phone…"
                  oninput="debounceLoad()" />
              </div>
              <select class="select-filter" id="role-filter" onchange="loadUsers()">
                <option value="">All Roles</option>
                <option value="patient">Patients</option>
                <option value="doctor">Doctors</option>
                <option value="assistant">Assistants</option>
              </select>
              <select class="select-filter" id="status-filter" onchange="loadUsers()">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Joined</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="users-tbody">
                  <tr>
                    <td colspan="8" style="text-align:center;padding:32px;color:var(--gray)">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div
              style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px">
              <div id="page-info" style="font-size:12px;color:var(--gray)"></div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-ghost btn-sm" id="prev-btn" onclick="changePage(-1)"><i
                    class="fa-solid fa-chevron-left"></i> Prev</button>
                <button class="btn btn-ghost btn-sm" id="next-btn" onclick="changePage(1)">Next <i
                    class="fa-solid fa-chevron-right"></i></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="view-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>User Details</h3>
        <button class="modal-close" onclick="closeModal('view-modal')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="view-modal-body"></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('view-modal')">Close</button></div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../../js/config.js"></script>
  <script src="../js/admin-users.js"></script>

</body>

</html>
